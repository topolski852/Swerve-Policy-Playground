<svg xmlns="http://www.w3.org/2000/svg" width="960" height="200" viewBox="0 0 960 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a2236"/>
      <stop offset="100%" stop-color="#0d111a"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1e3a5f" opacity="0.5"/>
    </pattern>
    <clipPath id="clip">
      <rect width="960" height="200" rx="12"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="960" height="200" fill="url(#bg)" rx="12"/>
  <rect width="960" height="200" fill="url(#dots)" rx="12" opacity="0.6"/>

  <!-- lightning bolts — left cluster (blue large, gold medium, alternating small) -->
  <g clip-path="url(#clip)">
    <!-- bolt path: M 20,0 L 8,50 L 15,50 L 3,100 L 24,45 L 17,45 Z  (24×100 units) -->
    <!-- left A: translate(10,5) scale(1.5) — blue -->
    <polygon points="40,5 22,80 32.5,80 14.5,155 46,72.5 35.5,72.5"
             fill="#4a9eff" opacity="0.28"/>
    <!-- left B: translate(58,25) scale(1.0) — gold -->
    <polygon points="78,25 66,75 73,75 61,125 82,70 75,70"
             fill="#f5c842" opacity="0.20"/>
    <!-- left C: translate(98,45) scale(0.7) — blue -->
    <polygon points="112,45 103.6,80 108.5,80 100.1,115 114.8,76.5 109.9,76.5"
             fill="#4a9eff" opacity="0.16"/>
    <!-- left D: translate(40,90) scale(0.5) — gold -->
    <polygon points="50,90 44,115 47.5,115 41.5,140 52,112.5 48.5,112.5"
             fill="#f5c842" opacity="0.14"/>

    <!-- right cluster — colours swapped -->
    <!-- right A: translate(914,5) scale(1.5) — gold -->
    <polygon points="944,5 926,80 936.5,80 918.5,155 950,72.5 939.5,72.5"
             fill="#f5c842" opacity="0.28"/>
    <!-- right B: translate(878,25) scale(1.0) — blue -->
    <polygon points="898,25 886,75 893,75 881,125 902,70 895,70"
             fill="#4a9eff" opacity="0.20"/>
    <!-- right C: translate(845,45) scale(0.7) — gold -->
    <polygon points="859,45 850.6,80 855.5,80 847.1,115 861.8,76.5 856.9,76.5"
             fill="#f5c842" opacity="0.16"/>
    <!-- right D: translate(908,90) scale(0.5) — blue -->
    <polygon points="918,90 912,115 915.5,115 909.5,140 920,112.5 916.5,112.5"
             fill="#4a9eff" opacity="0.14"/>
  </g>

  <!-- accent line top — blue -->
  <rect x="0" y="0" width="960" height="2" fill="#4a9eff" rx="1" opacity="0.7"/>

  <!-- title -->
  <text x="480" y="98"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="52" font-weight="700" text-anchor="middle" letter-spacing="-1">
    <tspan fill="#4a9eff">Swerve </tspan><tspan fill="#d0d8e8">Policy </tspan><tspan fill="#f5c842">Playground</tspan>
  </text>

  <!-- tagline -->
  <text x="480" y="140"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="400" fill="#7a9bbf" text-anchor="middle" letter-spacing="3">
    REINFORCEMENT LEARNING VISUALIZER · TEAM 1507 WARLOCKS
  </text>

  <!-- accent line bottom — gold -->
  <rect x="0" y="198" width="960" height="2" fill="#f5c842" rx="1" opacity="0.5"/>
</svg>
